<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPRCA Team Project Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<style>
:root{--ou-green:#006A4E;--ou-green-dark:#00472F;--ou-green-light:#E8F4F0;--ou-gold:#C5962B;--ou-gold-light:#FDF6E3;--bg:#fff;--bg2:#f7f8f9;--bg3:#eef0f2;--text:#111827;--text2:#4B5563;--text3:#9CA3AF;--border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);--radius:8px;--radius-lg:12px;--green-bg:#E8F5E9;--green-text:#1B5E20;--green-border:#81C784;--yellow-bg:#FFFDE7;--yellow-text:#7B5800;--yellow-border:#FFD54F;--red-bg:#FFEBEE;--red-text:#B71C1C;--red-border:#EF9A9A;--black-bg:#ECEFF1;--black-text:#263238;--black-border:#90A4AE;--blue-bg:#E3F2FD;--blue-text:#0D47A1;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 12px rgba(0,0,0,.10),0 2px 4px rgba(0,0,0,.06);}
@media(prefers-color-scheme:dark){:root{--ou-green:#00A67E;--ou-green-dark:#007A5E;--ou-green-light:#0a2820;--ou-gold:#E8B84B;--ou-gold-light:#2a1f00;--bg:#111827;--bg2:#1F2937;--bg3:#161D29;--text:#F9FAFB;--text2:#9CA3AF;--text3:#4B5563;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);--green-bg:#0a2e0a;--green-text:#86EFAC;--green-border:#166534;--yellow-bg:#1c1500;--yellow-text:#FDE68A;--yellow-border:#92400E;--red-bg:#1f0808;--red-text:#FCA5A5;--red-border:#7F1D1D;--black-bg:#1a2530;--black-text:#CBD5E1;--black-border:#334155;--blue-bg:#0c1f3d;--blue-text:#93C5FD;--shadow:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 4px 12px rgba(0,0,0,.4);}}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}input,select,textarea,button{font-family:inherit}
#loading-screen{position:fixed;inset:0;background:var(--ou-green-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:1.5rem}
#loading-screen .ls-logo{height:72px;width:auto;filter:brightness(0) invert(1)}
#loading-screen .ls-title{color:#fff;font-size:18px;font-weight:700}
#loading-screen .ls-sub{color:rgba(255,255,255,.6);font-size:13px}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#login-wrap{display:none;position:fixed;inset:0;background:var(--ou-green-dark);align-items:center;justify-content:center;z-index:9998;padding:1rem}
#login-wrap.show{display:flex}
.lcard{background:var(--bg);border-radius:var(--radius-lg);width:100%;max-width:400px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.lcard-head{background:var(--ou-green-dark);padding:1.75rem;text-align:center;border-bottom:3px solid var(--ou-gold)}
.lcard-head img{height:44px;width:auto;filter:brightness(0) invert(1);margin-bottom:.75rem}
.lcard-head h2{color:#fff;font-size:16px;font-weight:800;letter-spacing:-.01em}
.lcard-head p{color:rgba(255,255,255,.6);font-size:12px;margin-top:3px}
.lcard-body{padding:1.75rem}
.lf{margin-bottom:1rem}
.lf label{display:block;font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.lf input,.lf select{width:100%;height:42px;padding:0 12px;font-size:14px;border:1.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.lf input:focus,.lf select:focus{border-color:var(--ou-green)}
.lbtn{width:100%;height:44px;background:var(--ou-green);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;margin-top:.25rem;transition:background .15s}
.lbtn:hover{background:var(--ou-green-dark)}
.lerr{background:var(--red-bg);color:var(--red-text);border:1px solid var(--red-border);border-radius:var(--radius);padding:.6rem .85rem;font-size:13px;margin-bottom:.75rem;display:none}
.lerr.show{display:block}
.linfo{background:var(--blue-bg);color:var(--blue-text);border:1px solid #90CAF9;border-radius:var(--radius);padding:.6rem .85rem;font-size:13px;margin-bottom:.75rem;display:none}
.linfo.show{display:block}
.lsuccess{background:var(--green-bg);color:var(--green-text);border:1px solid var(--green-border);border-radius:var(--radius);padding:.6rem .85rem;font-size:13px;margin-bottom:.75rem;display:none}
.lsuccess.show{display:block}
.llink{background:none;border:none;color:var(--ou-green);font-size:13px;cursor:pointer;text-decoration:underline;font-family:inherit;margin-top:.75rem;display:inline-block}
.topbar{background:var(--ou-green-dark);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--ou-gold)}
.topbar-brand{display:flex;align-items:center;gap:14px}
.topbar-title h1{color:#fff;font-size:13px;font-weight:700;line-height:1.2}
.topbar-right{display:flex;align-items:center;gap:8px}
.live-dot{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#86EFAC;padding:3px 8px;border-radius:20px;border:1px solid rgba(134,239,172,.3);background:rgba(134,239,172,.1)}
.live-dot span{width:6px;height:6px;border-radius:50%;background:#86EFAC;animation:pulse 2s infinite;display:inline-block}
.user-chip{display:flex;align-items:center;gap:7px;padding:3px 10px 3px 4px;border-radius:20px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18)}
.u-av{width:26px;height:26px;border-radius:50%;background:var(--ou-gold);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--ou-green-dark);flex-shrink:0}
.u-name{color:#fff;font-size:12px;font-weight:600}
.main{max-width:1600px;margin:0 auto;padding:1.25rem 1.5rem 4rem}
.metric-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.mc{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:.85rem 1rem;box-shadow:var(--shadow);position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.mc.g::before{background:var(--green-border)}.mc.y::before{background:var(--yellow-border)}.mc.r::before{background:var(--red-border)}.mc.o::before{background:var(--ou-gold)}
.mc .ml{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px}
.mc .mv{font-size:26px;font-weight:800;color:var(--text);line-height:1}
.mc .ms{font-size:11px;color:var(--text2);margin-top:4px}
.btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:5px 12px;height:32px;border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit}
.btn:hover{background:var(--bg2)}.btn.pri{background:var(--ou-green);color:#fff;border-color:transparent}.btn.pri:hover{background:var(--ou-green-dark)}
.btn.gld{background:var(--ou-gold);color:#fff;border-color:transparent;font-weight:700}.btn.gld:hover{opacity:.9}
.btn.dng{background:var(--red-bg);color:var(--red-text);border-color:var(--red-border)}
.btn.ext{background:var(--yellow-bg);color:var(--yellow-text);border-color:var(--yellow-border);font-size:12px;height:28px;padding:3px 10px}
.btn.sm{height:30px;font-size:12px;padding:4px 10px}.btn.xs{height:24px;font-size:11px;padding:2px 8px}
.btn.gh{border-color:transparent;color:var(--text2)}.btn.gh:hover{background:var(--bg2);color:var(--text)}
.btn.eml{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border);font-size:12px;height:28px;padding:3px 10px}
.btn.adm{background:#4F46E5;color:#fff;border-color:transparent}.btn.adm:hover{background:#4338CA}
.ibtn{background:none;border:none;cursor:pointer;padding:5px;border-radius:var(--radius);color:var(--text2);font-size:16px;display:inline-flex;align-items:center;transition:all .15s}
.ibtn:hover{color:var(--text);background:var(--bg2)}
.toolbar{display:flex;align-items:flex-end;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.sw{position:relative;flex:1;min-width:160px;display:flex;flex-direction:column;gap:3px}
.sw .flbl{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.sw i{position:absolute;left:10px;bottom:9px;color:var(--text3);pointer-events:none;font-size:14px}
.sw input{padding-left:32px;width:100%}
.filter-group{display:flex;flex-direction:column;gap:3px}
.filter-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.filter-group select{min-width:110px}
.filter-group.active .filter-label{color:var(--ou-green)}
.filter-group.active select{border-color:var(--ou-green);background:var(--ou-green-light);color:var(--ou-green);font-weight:700}
input[type=text],input[type=email],input[type=number],input[type=date],input[type=password],select,textarea{font-family:inherit;font-size:12px;padding:5px 8px;height:32px;border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--ou-green)}
textarea{height:auto;resize:vertical}
input[type=checkbox]{width:15px;height:15px;accent-color:var(--ou-green);cursor:pointer}
.etog{display:flex;align-items:center;gap:8px;padding:5px 12px;height:34px;border:.5px solid var(--border2);border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;background:var(--bg);color:var(--text2);user-select:none}
.etog.on{background:var(--ou-gold-light);color:var(--ou-gold);border-color:var(--ou-gold)}
.cat-tabs{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.dash-view-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;padding:7px 18px;height:36px;border-radius:20px;border:1.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
.dash-view-btn:hover{background:var(--bg2);color:var(--text)}
.dash-view-btn.active{background:var(--ou-green);color:#fff;border-color:var(--ou-green);box-shadow:0 2px 8px rgba(0,106,78,.25)}
.cat-tab{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;padding:7px 18px;height:36px;border-radius:20px;border:1.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none}
.cat-tab:hover{background:var(--bg2);color:var(--text);border-color:var(--border2)}
.cat-tab.active{background:var(--ou-green);color:#fff;border-color:var(--ou-green);box-shadow:0 2px 8px rgba(0,106,78,.25)}
.cat-tab .ctc{background:rgba(255,255,255,.3);color:inherit;font-size:10px;font-weight:800;padding:1px 7px;border-radius:10px;margin-left:2px}
.cat-tab:not(.active) .ctc{background:var(--bg3);color:var(--text3)}
.rbadge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;border:.5px solid transparent}
.rg{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border)}
.ry{background:var(--yellow-bg);color:var(--yellow-text);border-color:var(--yellow-border)}
.rr{background:var(--red-bg);color:var(--red-text);border-color:var(--red-border)}
.rb{background:var(--black-bg);color:var(--black-text);border-color:var(--black-border)}
.rc{background:var(--blue-bg);color:var(--blue-text);border-color:#90CAF9}
.flag-eric{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;background:var(--ou-gold-light);color:var(--ou-gold);border:.5px solid var(--ou-gold);text-transform:uppercase;letter-spacing:.04em}
.vbadge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;border:.5px solid transparent}
.vpriv{background:#F3E8FF;color:#6B21A8;border-color:#C084FC}
.vgrp{background:var(--blue-bg);color:var(--blue-text);border-color:#90CAF9}
.pdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#EF4444;animation:pulse 1.5s infinite}
.tw{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead th{font-size:10px;font-weight:800;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;padding:8px 10px;text-align:left;background:var(--bg2);border-bottom:.5px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:.5px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg2)}
tbody tr.re{background:var(--ou-gold-light)}
tbody tr.re:hover{background:#FAF0C0}
tbody tr.rr-row{background:var(--red-bg)}
tbody td{font-size:12px;padding:7px 10px;color:var(--text);vertical-align:middle}
.ie{background:none;border:none;font-size:13px;color:var(--text);font-family:inherit;cursor:pointer;padding:2px 4px;border-radius:4px;width:100%}
.ie:hover{background:var(--bg3)}.ie:focus{outline:1.5px solid var(--ou-green);background:var(--bg);cursor:text}
select.ie{cursor:pointer;height:auto;padding:2px 4px}
.pdiv td{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:6px 12px;background:var(--bg3);color:var(--text3);border-bottom:.5px solid var(--border)}
.cb-banner{background:var(--red-bg);border:1px solid var(--red-border);border-radius:var(--radius);padding:.85rem 1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:12px;font-size:13px;color:var(--red-text);cursor:pointer}
.cb-banner:hover{opacity:.9}
.todo-alert-wrap{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1rem;box-shadow:var(--shadow);overflow:hidden}
.todo-alert-header{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1rem;background:var(--bg2);border-bottom:.5px solid var(--border);cursor:pointer;user-select:none}
.todo-alert-header:hover{background:var(--bg3)}
.todo-alert-title{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;color:var(--text);text-transform:uppercase;letter-spacing:.05em}
.todo-alert-body{padding:.6rem .75rem}
.todo-alert-row{display:flex;align-items:center;gap:10px;padding:.45rem .5rem;border-radius:var(--radius);margin-bottom:4px;cursor:pointer;transition:background .12s}
.todo-alert-row:last-child{margin-bottom:0}
.todo-alert-row:hover{background:var(--bg2)}
.todo-alert-row.overdue{background:var(--red-bg)}
.todo-alert-row.overdue:hover{background:#ffd9d9}
.todo-alert-row.today{background:var(--yellow-bg)}
.todo-alert-row.today:hover{background:#fff0a0}
.todo-alert-row.soon{background:var(--bg2)}
.tad-pri{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tad-text{flex:1;font-size:12px;font-weight:600;color:var(--text)}
.tad-due{font-size:11px;font-weight:700;white-space:nowrap}
.tad-chip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}
.sh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.1rem;flex-wrap:wrap;gap:.5rem}
.sh h2{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-.02em}
.sh p{font-size:11px;color:var(--text2);margin-top:2px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.modal{background:var(--bg);border:.5px solid var(--border2);border-radius:var(--radius-lg);width:100%;max-width:640px;padding:1.75rem;position:relative;margin:auto;box-shadow:var(--shadow-md)}
.modal h2{font-size:18px;font-weight:800;color:var(--text);margin-bottom:4px;padding-right:2rem}
.modal .msub{font-size:13px;color:var(--text2);margin-bottom:1.5rem}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:1.5rem;padding-top:1rem;border-top:.5px solid var(--border)}
.mclose{position:absolute;top:1rem;right:1rem}
.fr{margin-bottom:.9rem}
.fr .fl{display:block;font-size:10px;font-weight:800;color:var(--text2);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px}
.fr input,.fr select,.fr textarea{width:100%}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f3{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end}
.sdiv{font-size:10px;font-weight:800;color:var(--text2);letter-spacing:.07em;text-transform:uppercase;margin:1.4rem 0 .8rem;padding-bottom:.5rem;border-bottom:.5px solid var(--border);display:flex;align-items:center;gap:8px}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tcard{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius);padding:.65rem .85rem;display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:border-color .15s}
.tcard.on{border-color:var(--ou-green);background:var(--ou-green-light)}
.tcard label{font-size:13px;font-weight:500;cursor:pointer}
.tcard .td{font-size:11px;color:var(--text2);margin-top:2px}
.vis-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:.9rem}
.vopt{border:1.5px solid var(--border2);border-radius:var(--radius);padding:.85rem;cursor:pointer;transition:all .15s;text-align:center}
.vopt .vi{font-size:22px;margin-bottom:6px}
.vopt h4{font-size:13px;font-weight:700;color:var(--text)}
.vopt p{font-size:11px;color:var(--text2);margin-top:2px}
.vopt.sel-priv{border-color:#A855F7;background:#F3E8FF}
.vopt.sel-grp{border-color:var(--ou-green);background:var(--ou-green-light)}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.di{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius);padding:.65rem .85rem}
.di .dil{font-size:10px;font-weight:800;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px}
.di .dv{font-size:14px;font-weight:700;color:var(--text)}
.ne{padding:.55rem 0;border-bottom:.5px solid var(--border);font-size:13px;line-height:1.5}
.ne:last-child{border-bottom:none}
.nm{font-size:11px;color:var(--text3);margin-bottom:2px}
.etr{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;border-bottom:.5px solid var(--border);gap:8px}
.etr:last-child{border-bottom:none}
.rrow{display:flex;align-items:center;gap:8px;background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius);padding:.5rem .75rem;margin-bottom:6px;font-size:13px}
.rrow .rn{font-weight:700;min-width:90px}
.rrow .re{color:var(--text2);flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.aur{display:flex;align-items:center;gap:12px;padding:.75rem 0;border-bottom:.5px solid var(--border)}
.aur:last-child{border-bottom:none}
.auav{width:36px;height:36px;border-radius:50%;background:var(--ou-green-light);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--ou-green);flex-shrink:0}
.logrow{display:flex;align-items:flex-start;gap:10px;padding:.55rem 0;border-bottom:.5px solid var(--border);font-size:12px}
.logrow:last-child{border-bottom:none}
.ldot{width:8px;height:8px;border-radius:50%;margin-top:3px;flex-shrink:0}
#toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:var(--bg);padding:.7rem 1.1rem;border-radius:var(--radius);font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-md)}
#toast.show{opacity:1}
.empty{text-align:center;padding:4rem 1rem;color:var(--text2)}
.empty i{font-size:36px;display:block;margin:0 auto 12px;color:var(--text3)}
.tab-bar{background:var(--ou-green-dark);padding:0 1.5rem;display:flex;align-items:flex-end;gap:4px;border-bottom:1px solid rgba(255,255,255,.1)}

.mem-card-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.75rem}
.mem-card-name{font-size:15px;font-weight:800;color:var(--text);line-height:1.3}
.mem-card-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:.85rem}
.mem-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.85rem}
.mem-meta-item .mml{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.mem-meta-item .mmv{font-size:13px;font-weight:700;color:var(--text)}
.mem-renewal-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:.75rem}
.mem-actions{display:flex;gap:6px;flex-wrap:wrap}
/* ── Policies tab ── */
.pol-wrap{max-width:1100px;margin:0 auto}
.pol-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.75rem}
.pol-header h2{font-size:20px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px}
.pol-table-wrap{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow)}
.pol-table{width:100%;border-collapse:collapse}
.pol-table th{font-size:10px;font-weight:800;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;padding:9px 12px;background:var(--bg2);border-bottom:.5px solid var(--border);text-align:left;white-space:nowrap}
.pol-table td{font-size:13px;padding:10px 12px;border-bottom:.5px solid var(--border);vertical-align:top;color:var(--text)}
.pol-table tr:last-child td{border-bottom:none}
.pol-table tr:hover td{background:var(--bg2);cursor:pointer}
.pol-status{display:inline-flex;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.pol-s-active{background:#E8F5E9;color:#1B5E20}
.pol-s-draft{background:#FFF8E1;color:#7B5800}
.pol-s-review{background:var(--blue-bg);color:var(--blue-text)}
.pol-s-archived{background:var(--bg3);color:var(--text3)}
.pol-history{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius);padding:.75rem 1rem;margin-top:.5rem}
.pol-history-entry{display:flex;gap:10px;padding:.4rem 0;border-bottom:.5px solid var(--border);font-size:12px}
.pol-history-entry:last-child{border-bottom:none}
.pol-history-date{font-weight:700;color:var(--text);white-space:nowrap;min-width:80px}
.pol-history-author{color:var(--text3);white-space:nowrap;min-width:100px}
.pol-history-note{color:var(--text2);flex:1}
/* ── My Tasks tab ── */
.tasks-wrap{max-width:900px;margin:0 auto}
.tasks-col-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.tasks-section{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;box-shadow:var(--shadow)}
.tasks-section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.tasks-section-head h3{font-size:15px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:7px}
.reminder-item{display:flex;align-items:center;gap:10px;padding:.55rem .65rem;border-radius:var(--radius);border:.5px solid var(--border);margin-bottom:6px;background:var(--bg2);transition:background .12s}
.reminder-item:hover{background:var(--bg3)}
.reminder-item.due-today{background:var(--yellow-bg);border-color:var(--ou-gold)}
.reminder-item.overdue-rem{background:var(--red-bg);border-color:var(--red-border)}
.rem-text{flex:1;font-size:13px;color:var(--text);font-weight:500}
.rem-date{font-size:11px;font-weight:700;white-space:nowrap}
.lookahead-item{display:flex;align-items:center;gap:10px;padding:.5rem .65rem;border-bottom:.5px solid var(--border);font-size:12px}
.lookahead-item:last-child{border-bottom:none}
.lookahead-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lookahead-name{flex:1;font-weight:600;color:var(--text)}
.lookahead-type{font-size:10px;color:var(--text3);font-weight:600}
.lookahead-date{font-size:11px;font-weight:700;white-space:nowrap}
/* ── Finance tab ── */
.fin-wrap{max-width:1100px;margin:0 auto}
.fin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.75rem}
.fin-header h2{font-size:20px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px}
.fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.5rem}
.fin-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;box-shadow:var(--shadow)}
.fin-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.fin-card-head h3{font-size:15px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:7px}
.cc-row{display:flex;align-items:center;gap:10px;padding:.65rem .75rem;border-.5px solid var(--border);border-radius:var(--radius);margin-bottom:6px;background:var(--bg2);cursor:pointer;transition:background .12s}
.cc-row:hover{background:var(--bg3)}
.cc-row.due-soon-cc{background:var(--red-bg);border:.5px solid var(--red-border)}
.cc-name{font-size:13px;font-weight:700;color:var(--text);flex:1}
.cc-last4{font-size:11px;color:var(--text3);font-weight:600}
.cc-due{font-size:12px;font-weight:700;white-space:nowrap}
.cc-amount{font-size:12px;color:var(--text2);white-space:nowrap}
.pay-history{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius);padding:.65rem .85rem;margin-top:.5rem}
.pay-entry{display:flex;gap:10px;padding:.35rem 0;border-bottom:.5px solid var(--border);font-size:12px;align-items:center}
.pay-entry:last-child{border-bottom:none}
.pay-date{font-weight:700;color:var(--text);white-space:nowrap;min-width:75px}
.pay-amount{font-weight:700;color:var(--ou-green);white-space:nowrap;min-width:70px}
.pay-note{color:var(--text2);flex:1}
/* ── Agenda Builder tab ── */
.agenda-wrap{max-width:900px;margin:0 auto}
.agenda-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.75rem}
.agenda-header h2{font-size:20px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px}
.agenda-meta{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:1.25rem;background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;box-shadow:var(--shadow)}
.agenda-items{display:flex;flex-direction:column;gap:8px}
.agenda-item-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius);padding:.75rem 1rem;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);transition:box-shadow .12s;position:relative}
.agenda-item-card:hover{box-shadow:var(--shadow-md)}
.agenda-item-card.discussed{opacity:.55;background:var(--bg2)}
.agenda-drag{cursor:grab;color:var(--text3);font-size:16px;flex-shrink:0}
.agenda-drag:active{cursor:grabbing}
.agenda-num{width:26px;height:26px;border-radius:50%;background:var(--ou-green);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.agenda-item-card.discussed .agenda-num{background:var(--green-border)}
.agenda-item-body{flex:1;min-width:0}
.agenda-item-title{font-size:13px;font-weight:700;color:var(--text)}
.agenda-item-card.discussed .agenda-item-title{text-decoration:line-through;color:var(--text3)}
.agenda-item-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.agenda-item-notes{font-size:12px;color:var(--text2);margin-top:4px;font-style:italic}
.agenda-actions{display:flex;gap:4px;flex-shrink:0;align-items:center}
.agenda-time{width:55px;font-size:12px;text-align:center;height:28px;padding:0 4px}
.agenda-preview{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;font-family:monospace;font-size:12px;line-height:1.8;white-space:pre-wrap;color:var(--text);max-height:350px;overflow-y:auto}
@media(max-width:700px){.fin-grid,.tasks-col-grid{grid-template-columns:1fr}}
/* ── Performer view ── */
.perf-wrap{max-width:860px;margin:0 auto}
.perf-header{margin-bottom:1.5rem}
.perf-header h2{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.02em}
.perf-header p{font-size:13px;color:var(--text2);margin-top:4px}
.perf-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.perf-mc{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;box-shadow:var(--shadow);text-align:center}
.perf-mc .pml{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.perf-mc .pmv{font-size:28px;font-weight:800;color:var(--text);line-height:1}
.perf-mc .pms{font-size:12px;color:var(--text2);margin-top:4px}
.perf-section{margin-bottom:1.5rem}
.perf-section-title{font-size:13px;font-weight:800;color:var(--text);letter-spacing:.04em;text-transform:uppercase;margin-bottom:.85rem;display:flex;align-items:center;gap:8px;padding-bottom:.5rem;border-bottom:2px solid var(--ou-green)}
.perf-section-title span{background:var(--ou-green);color:#fff;font-size:10px;font-weight:800;padding:1px 7px;border-radius:10px}
.task-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:10px;box-shadow:var(--shadow);border-left:4px solid var(--ou-green);transition:box-shadow .15s}
.task-card:hover{box-shadow:var(--shadow-md)}
.task-card.overdue{border-left-color:#EF4444;background:var(--red-bg)}
.task-card.due-soon{border-left-color:var(--ou-gold);background:var(--yellow-bg)}
.task-card.done-card{border-left-color:var(--green-border);opacity:.65}
.task-card-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.5rem;gap:10px}
.task-card-title{font-size:14px;font-weight:800;color:var(--text);flex:1}
.task-card.done-card .task-card-title{text-decoration:line-through;color:var(--text3)}
.task-project{font-size:11px;color:var(--text3);margin-bottom:.5rem;display:flex;align-items:center;gap:4px}
.task-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:.75rem}
.task-due{font-size:12px;font-weight:700}
.task-type{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.task-type-review{background:#EDE9FE;color:#5B21B6}
.task-type-action{background:var(--ou-green-light);color:var(--ou-green)}
.task-actions{display:flex;gap:8px;flex-wrap:wrap}
.task-review-status{margin-top:.6rem;padding:.5rem .75rem;background:var(--bg2);border-radius:var(--radius);border:.5px solid var(--border)}
.task-review-status .rs-title{font-size:10px;font-weight:800;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
.task-reviewer{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;margin-right:8px;margin-bottom:3px}
.task-reviewer.done{color:var(--green-text)}
.task-reviewer.pending{color:var(--text3)}
.perf-project-row{display:flex;align-items:center;gap:12px;padding:.75rem 1rem;background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;box-shadow:var(--shadow)}
.perf-project-row:hover{background:var(--bg2)}
.perf-empty{text-align:center;padding:2.5rem 1rem;color:var(--text2);background:var(--bg2);border:.5px dashed var(--border2);border-radius:var(--radius-lg)}
.perf-empty i{font-size:28px;display:block;margin:0 auto 8px;color:var(--text3)}
/* ── Design Log ── */
.log-wrap{max-width:860px;margin:0 auto}
.log-page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:.75rem}
.log-page-header h2{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.log-entry{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1rem;box-shadow:var(--shadow);border-left:4px solid var(--ou-green)}
.log-entry.decision{border-left-color:var(--ou-gold)}
.log-entry.removed{border-left-color:var(--text3);opacity:.8}
.log-entry.future{border-left-color:#3B82F6}
.log-entry-head{display:flex;align-items:center;gap:10px;margin-bottom:.6rem;flex-wrap:wrap}
.log-entry-title{font-size:15px;font-weight:800;color:var(--text)}
.log-entry-date{font-size:11px;color:var(--text3);font-weight:600}
.log-entry-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.tag-feature{background:var(--ou-green-light);color:var(--ou-green)}
.tag-decision{background:var(--ou-gold-light);color:var(--ou-gold)}
.tag-removed{background:var(--bg3);color:var(--text3)}
.tag-future{background:#EFF6FF;color:#1D4ED8}
.tag-fix{background:var(--red-bg);color:var(--red-text)}
.log-entry-body{font-size:13px;color:var(--text2);line-height:1.65}
.log-entry-body ul{margin:.5rem 0 0 1.25rem}
.log-entry-body ul li{margin-bottom:4px}
.log-section-label{font-size:11px;font-weight:800;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin:1.5rem 0 .75rem;padding-bottom:.4rem;border-bottom:.5px solid var(--border)}
</style>
</head>

function renderPerfDone(){

    .map(p=>({type:'project',id:p.id,name:p.name,category:p.category||'—',completedDate:p.completedDate||''}));
  const doneTodos=(_previewingAs?[]:_todos.filter(t=>t.done))
    .map(t=>({type:'todo',id:t.id,name:t.text,category:'To-Do',completedDate:t.doneDate||''}));
  const allDone=[...doneItems,...doneTodos].sort((a,b)=>(b.completedDate||'').localeCompare(a.completedDate||''));

  let html=`<div class="perf-wrap">
    <div style="margin-bottom:1rem">
      <h2 style="font-size:18px;font-weight:800;color:var(--text)"><i class="ti ti-checks" style="color:var(--green-text);font-size:18px"></i> Completed items</h2>

window.acknowledgeItem=async id=>{
  const p=S.projects.find(x=>x.id===id);if(!p)return;
  if(!p.acknowledged)p.acknowledged={};
  p.acknowledged[CU]=today();
  logActivity(p,`Acknowledged by ${CU}`);
  await saveP(p);
  // Notify Brian via the notification log
  if(!isAdmin()){
    S.notifLog.unshift({date:today(),project:p.name,trigger:`${CU} acknowledged this item`,daysLeft:p.due?dU(p.due):null,recipients:ADMIN,href:null});
    await saveLog(S.notifLog);updateNotifBadge();
  }
  if(isAdmin())renderDash(); else renderPerformerDash();
  updatePerfLogBadge();
  toast('Acknowledged ✓');
};

window.updateItemStatus=async(id,status)=>{
  const p=S.projects.find(x=>x.id===id);if(!p)return;
  p.phase=status;p.status=status;
  if(status==='Completed'){p.completed=true;p.completedDate=today();}
  else{p.completed=false;p.completedDate=null;}
  p.notes=p.notes||[];
  p.notes.push({date:today(),text:`Status changed to: ${status}`,author:CU});
  logActivity(p,`Status changed to "${status}" by ${CU}`);
  await saveP(p);
  if(isAdmin())renderDash(); else renderPerformerDash();
  toast(`Status updated to ${status}`);
};

window.savePerformerDetailUpdate=async id=>{
  const note=document.getElementById('pd-note')?.value.trim();
  const status=document.querySelector('[name=pd-status]:checked')?.value;
  const p=S.projects.find(x=>x.id===id);if(!p)return;
  let changed=false;
  let logMsgs=[];
  if(status&&status!==p.phase){
    p.phase=status;p.status=status;
    if(status==='Completed'){p.completed=true;p.completedDate=today();}
    else{p.completed=false;p.completedDate=null;}
    logActivity(p,`Status changed to "${status}" by ${CU}`);
    logMsgs.push(`${CU} changed status to "${status}"`);
    changed=true;
  }
  if(note){
    p.notes=p.notes||[];
    p.notes.push({date:today(),text:note,author:CU});
    logActivity(p,`Note added by ${CU}: "${note.slice(0,80)}${note.length>80?'…':''}"`);
    logMsgs.push(`${CU} added a note: "${note.slice(0,60)}${note.length>60?'…':''}"`);
    changed=true;
  }
  if(!changed){toast('Nothing to save.');return;}
  await saveP(p);
  // Notify Brian via notification log
  if(!isAdmin()&&logMsgs.length){
    logMsgs.forEach(msg=>{
      S.notifLog.unshift({date:today(),project:p.name,trigger:msg,daysLeft:p.due?dU(p.due):null,recipients:ADMIN,href:null});
    });
    await saveLog(S.notifLog);updateNotifBadge();
  }
  closeOv();
  renderPerformerDash();
  if(_perfTab==='done')renderPerfDone();
  toast('Update saved.');
};

window.emailBackToBrian=id=>{
  const p=S.projects.find(x=>x.id===id);if(!p)return;
  const note=document.getElementById('pd-note')?.value.trim()||'';
  const status=document.querySelector('[name=pd-status]:checked')?.value||p.phase;
  const brian=OWNERS.find(o=>o.name===ADMIN);
  const sub=encodeURIComponent(`[Update] ${p.name}`);
  const body=encodeURIComponent(`Hi Brian,\n\nHere is an update on: ${p.name}\n\nStatus: ${status}${note?'\n\nUpdate: '+note:''}\n\nThanks,\n${CU}`);
  window.open(`mailto:${brian?.email||'mershon@ohio.edu'}?subject=${sub}&body=${body}`,'_blank');
};

// ── Per-user read tracking for notif badge ──
function getNotifReadCount(){
  try{return parseInt(localStorage.getItem('notif_read_'+(CU||'').replace(/\s/g,'_'))||'0',10);}catch(e){return 0;}
}
function saveNotifReadCount(n){
  try{localStorage.setItem('notif_read_'+(CU||'').replace(/\s/g,'_'),String(n));}catch(e){}
}
function updateNotifBadge(){
  const badge=document.getElementById('notif-badge');if(!badge)return;
  // Count entries relevant to this user (all for now since log is shared)
  const unread=S.notifLog.length-getNotifReadCount();
  if(unread>0){badge.textContent=unread>9?'9+':unread;badge.style.display='';}
  else{badge.style.display='none';}
}

let _cardLog=[]; // current FY entries
let _unsubCardLog=null;
let _cardLogFY=null; // selected FY, e.g. "FY2026"
const CARDLOG_USERS=['Brian Mershon','Keith Leffler'];

// FY runs July 1 – June 30. FY2026 = Jul 1 2025 – Jun 30 2026.
function currentFY(){
  const d=new Date();
  const y=d.getFullYear(),m=d.getMonth(); // 0-indexed month
  return m>=6 ? `FY${y+1}` : `FY${y}`; // July(6) or later -> next FY label
}
function fyOptions(){
  const cur=parseInt(currentFY().slice(2),10);
  const opts=[];
  for(let y=cur;y>=cur-4;y--)opts.push(`FY${y}`);
  return opts;
}
function fyDateRange(fy){
  const y=parseInt(fy.slice(2),10);
  return{start:`${y-1}-07-01`,end:`${y}-06-30`};
}

function startCardLogListener(){
  if(_unsubCardLog)_unsubCardLog();
  _cardLogFY=_cardLogFY||currentFY();
  _unsubCardLog=onSnapshot(doc(db,'meta','cardLog_'+_cardLogFY),sn=>{
    _cardLog=sn.exists()?(sn.data().entries||[]):[];
    if(isAdmin()&&currentTab==='cardlog')renderCardLog();
    if(!isAdmin()&&_perfTab==='cardlog')renderCardLog();
  },err=>{
    console.error('Card Log listener error:',err);
    toast('Could not load Card Log — check your connection and refresh.');
  });
}
function switchCardLogFY(fy){
  _cardLogFY=fy;
  startCardLogListener();
  renderCardLog();
}
async function saveCardLog(){
  await setDoc(doc(db,'meta','cardLog_'+_cardLogFY),{entries:_cardLog,updated:today()});
}

function canEditCardLog(){
  return CARDLOG_USERS.includes(CU);
}

window.addCardLogEntry=async()=>{
  const name=document.getElementById('cl-name')?.value.trim();
  const date=document.getElementById('cl-date')?.value||today();
  const amount=document.getElementById('cl-amount')?.value;
  const desc=document.getElementById('cl-desc')?.value.trim()||'';
  if(!name){toast('Enter an entry name.');return;}
  if(!amount||isNaN(parseFloat(amount))){toast('Enter a valid amount.');return;}

  const entry={id:String(Date.now()),name,date,amount:parseFloat(amount).toFixed(2),description:desc,addedBy:CU,addedDate:today()};
  _cardLog.push(entry);
  await saveCardLog();

  // Notify Brian + Keith only
  S.notifLog.unshift({date:today(),project:'Card Log',trigger:`${CU} added a $${entry.amount} entry: "${name}"`,daysLeft:null,recipients:CARDLOG_USERS.join(', '),href:null});
  await saveLog(S.notifLog);updateNotifBadge();

  // Clear form
  ['cl-name','cl-desc','cl-amount'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const dateEl=document.getElementById('cl-date');if(dateEl)dateEl.value=today();

  renderCardLog();
  toast(`Entry added — $${entry.amount}`);
};

window.deleteCardLogEntry=async id=>{
  if(!confirm('Delete this entry?'))return;
  const entry=_cardLog.find(e=>e.id===id);
  _cardLog=_cardLog.filter(e=>e.id!==id);
  await saveCardLog();

  if(entry){
    S.notifLog.unshift({date:today(),project:'Card Log',trigger:`${CU} removed a $${entry.amount} entry: "${entry.name}"`,daysLeft:null,recipients:CARDLOG_USERS.join(', '),href:null});
    await saveLog(S.notifLog);updateNotifBadge();
  }

  renderCardLog();
  toast('Entry removed.');
};

window.openEditCardLogEntry=id=>{
  const e=_cardLog.find(x=>x.id===id);if(!e)return;
  showOv(`<div class="modal" style="max-width:440px">
    <button class="ibtn mclose" onclick="closeOv()"><i class="ti ti-x"></i></button>
    <h2><i class="ti ti-edit" style="color:var(--ou-green);font-size:18px;vertical-align:-2px"></i> Edit entry</h2>
    <p class="msub">Update this Card Log entry.</p>
    <div class="fr"><label class="fl">Entry name</label><input type="text" id="ecl-name" value="${esc(e.name)}" style="width:100%"></div>
    <div class="f2">
      <div class="fr"><label class="fl">Date</label><input type="date" id="ecl-date" value="${esc(e.date)}" style="width:100%"></div>
      <div class="fr"><label class="fl">Amount</label><input type="number" id="ecl-amount" step="0.01" value="${esc(e.amount)}" style="width:100%"></div>
    </div>
    <div class="fr"><label class="fl">Description</label><input type="text" id="ecl-desc" value="${esc(e.description||'')}" style="width:100%"></div>
    <div class="mfoot">
      <button class="btn gh" onclick="closeOv()">Cancel</button>
      <button class="btn pri" onclick="saveCardLogEntryEdit('${id}')"><i class="ti ti-check"></i> Save</button>
    </div>
  </div>`);
  setTimeout(()=>{const el=document.getElementById('ecl-name');if(el){el.focus();el.select();}},80);
};

window.saveCardLogEntryEdit=async id=>{
  const e=_cardLog.find(x=>x.id===id);if(!e)return;
  const name=document.getElementById('ecl-name')?.value.trim();
  const date=document.getElementById('ecl-date')?.value;
  const amount=document.getElementById('ecl-amount')?.value;
  const desc=document.getElementById('ecl-desc')?.value.trim()||'';
  if(!name){toast('Enter an entry name.');return;}
  if(!date){toast('Enter a date.');return;}
  if(!amount||isNaN(parseFloat(amount))){toast('Enter a valid amount.');return;}

  const oldAmount=e.amount;
  e.name=name;e.date=date;e.amount=parseFloat(amount).toFixed(2);e.description=desc;
  e.editedBy=CU;e.editedDate=today();
  await saveCardLog();

  S.notifLog.unshift({date:today(),project:'Card Log',trigger:`${CU} edited an entry: "${name}" ($${oldAmount} → $${e.amount})`,daysLeft:null,recipients:CARDLOG_USERS.join(', '),href:null});
  await saveLog(S.notifLog);updateNotifBadge();

  closeOv();
  renderCardLog();
  toast('Entry updated ✅');
};

let _sops=[]; // in-memory cache — loaded from Firebase
let _unsubSOPs=null;

function startSOPListener(){
  if(_unsubSOPs)_unsubSOPs();
  _unsubSOPs=onSnapshot(collection(db,'sops'),sn=>{
    _sops=sn.docs.map(d=>({...d.data(),id:d.id})).sort((a,b)=>b.createdDate.localeCompare(a.createdDate));
  });
}
async function saveSOP(sop){await setDoc(doc(db,'sops',sop.id),sop);}
async function deleteSOP(id){await deleteDoc(doc(db,'sops',id));}

function buildSOPContent(p){
  const log=(p.activityLog||[]).slice().sort((a,b)=>a.ts-b.ts);
  const steps=p.steps||[];
  const notes=p.notes||[];
  const assigned=p.assignedTo||[];
  const acked=p.acknowledged||{};

  return{
    eventName:p.name,
    category:p.category,
    description:p.description||p.nextStep||'',
    createdDate:p.createdDate||p.updatedDate||today(),
    completedDate:p.completedDate||today(),
    assignedTo:assigned,
    acknowledged:acked,
    steps,notes,
    activityLog:log,
    generatedBy:CU,
    generatedDate:today()
  };
}

function buildTodoListHTML(){
  const td=today();
  const active=_todos.filter(t=>!t.done).sort((a,b)=>{
    if(a.due&&b.due)return a.due.localeCompare(b.due);
    if(a.due)return -1;if(b.due)return 1;return 0;
  });
  const done=_todos.filter(t=>t.done);
  if(!active.length&&!done.length){
    return`<div style="text-align:center;padding:1rem;color:var(--text3);font-size:12px">No to-dos yet — add one above.</div>`;
  }
  let h='';
  active.forEach(t=>{
    const overdue=t.due&&t.due<td;
    const dueToday=t.due===td;
    const days=t.due?Math.ceil((new Date(t.due)-new Date())/86400000):null;
    const dueColor=overdue?'var(--red-text)':dueToday?'var(--ou-gold)':'var(--text3)';
    const dueLabel=!t.due?'':overdue?`${Math.abs(days)}d overdue`:dueToday?'Today':days===1?'Tomorrow':fmtS(t.due);
    h+=`<div style="display:flex;align-items:center;gap:8px;padding:.45rem 0;border-bottom:.5px solid var(--border)">
      <input type="checkbox" style="accent-color:var(--ou-green);width:15px;height:15px;cursor:pointer;flex-shrink:0" onchange="toggleTodo('${t.id}',this.checked)">
      <span style="flex:1;font-size:12px;color:var(--text);line-height:1.4">${esc(t.text)}</span>
      ${t.assignTo?`<span style="font-size:10px;font-weight:700;color:${PRESENCE_COLORS[t.assignTo]||'#888'};white-space:nowrap;background:var(--bg2);padding:1px 6px;border-radius:10px">${esc(lastName(t.assignTo))}</span>`:''}
      ${t.due?`<span style="font-size:10px;font-weight:700;color:${dueColor};white-space:nowrap">${dueLabel}</span>`:''}
      <button class="ibtn" onclick="deleteTodo('${t.id}')" style="padding:2px;flex-shrink:0"><i class="ti ti-x" style="font-size:11px"></i></button>
    </div>`;
  });
  if(done.length){
    h+=`<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:.6rem 0 .3rem;display:flex;justify-content:space-between;align-items:center">
      Done (${done.length}) <button class="btn xs dng" onclick="clearDoneTodos()" style="font-size:10px;padding:1px 6px">Clear</button>
    </div>`;
    done.slice(0,5).forEach(t=>{
      h+=`<div style="display:flex;align-items:center;gap:8px;padding:.35rem 0;border-bottom:.5px solid var(--border);opacity:.5">
        <input type="checkbox" checked style="accent-color:var(--ou-green);width:15px;height:15px;cursor:pointer;flex-shrink:0" onchange="toggleTodo('${t.id}',this.checked)">
        <span style="flex:1;font-size:12px;color:var(--text3);text-decoration:line-through">${esc(t.text)}</span>
      </div>`;
    });
    if(done.length>5)h+=`<div style="font-size:11px;color:var(--text3);padding:.3rem 0">+${done.length-5} more completed</div>`;
  }
  return h;
}

window.clearDoneTodos=async()=>{
  _todos=_todos.filter(t=>!t.done);
  await saveTodos();
  updateTasksBadge();
  renderDash();
  toast('Done to-dos cleared.');
};


function startRemListener(){
  if(_unsubRem)_unsubRem();
  _unsubRem=onSnapshot(doc(db,'meta',remKey()),sn=>{
    const remItems=sn.exists()?(sn.data().items||[]):[];
    // Migrate any existing reminders into todos (one-time merge)
    if(remItems.length>0&&_todosLoaded){
      const existingIds=new Set(_todos.map(t=>t.id));
      const toMigrate=remItems.filter(r=>!existingIds.has(r.id));
      if(toMigrate.length>0){
        toMigrate.forEach(r=>{
          _todos.push({id:r.id,text:r.text,due:r.date||'',done:r.done||false,doneDate:r.doneDate||null,priority:'medium',createdDate:r.createdDate||today(),fromReminder:true});
        });
        saveTodos();
        // Clear the reminders store so we don't migrate again
        setDoc(doc(db,'meta',remKey()),{items:[],owner:CU,updated:today()});
      }
    }
    _reminders=remItems;
    updateTasksBadge();
    if(currentTab==='dash')renderDash();
  });
}

function updateTasksBadge(){
  const badge=document.getElementById('tasks-badge');if(!badge)return;
  const td=today();
  const due=_todos.filter(t=>!t.done&&t.due&&t.due<=td).length;
  if(due>0){badge.textContent=due>9?'9+':due;badge.style.display='';}
  else{badge.style.display='none';}
  // Also update notif log for overdue todos
  const overdue=_todos.filter(t=>!t.done&&t.due&&t.due<td);
  if(overdue.length>0&&_todosLoaded){
    // Only log once per day per item
    overdue.forEach(async t=>{
      const key=`todo_overdue_${t.id}_${td}`;
      if(!t.notifiedOverdue){
        t.notifiedOverdue=t.notifiedOverdue||{};
        if(!t.notifiedOverdue[td]){
          t.notifiedOverdue[td]=true;
          S.notifLog.unshift({date:td,project:'To-Do',trigger:`Overdue: ${t.text}`,daysLeft:Math.ceil((new Date(t.due)-new Date())/86400000),recipients:CU,href:null});
          saveLog(S.notifLog);updateNotifBadge();
        }
      }
    });
  }
}

// Force re-render to reset checkboxes if user cancels
window.forceRender=function(){
  if(isAdmin())renderDash();
  else renderPerformerDash();
};

window.selectCompleteOpt=function(val,category){
  const showFields=val==='yes';
  const fields=document.getElementById('next-step-fields');
  if(fields)fields.style.display=showFields?'':'none';
  ['no','yes','sop'].forEach(opt=>{
    const el=document.getElementById('opt-'+opt+'-label');
    if(el)el.style.borderColor=val===opt?'var(--ou-green)':'var(--border2)';
  });
};

window.doReopenItem=async id=>{
  const p=S.projects.find(x=>x.id===id);if(!p)return;
  p.completed=false;p.completedDate=null;p.phase='In Progress';p.status='In Progress';
  p.notes=p.notes||[];
  p.notes.push({date:today(),text:'Reopened by '+CU,author:CU});
  logActivity(p,`Reopened by ${CU}`);
  await saveP(p);
  closeOv();
  renderDash();
  if(!isAdmin())renderPerformerDash();
  toast('Item reopened and set to In Progress.');
};

window.submitComplete=async id=>{
  const p=S.projects.find(x=>x.id===id);if(!p)return;
  const hasNextStep=document.querySelector('[name=next-step-opt]:checked')?.value==='yes';
  const generateSOP=document.querySelector('[name=next-step-opt]:checked')?.value==='sop';
  const nsDesc=document.getElementById('ns-desc')?.value.trim();

  if(hasNextStep&&!nsDesc){toast('Please describe the next step.');return;}

  if(hasNextStep){
    // ── Follow-up path — keep item ACTIVE, update it with new step/deadline ──
    const nsDue=document.getElementById('ns-due')?.value||'';
    const nsAssign=document.getElementById('ns-assign')?.value||CU;

    // Update the existing item — don't mark complete
    p.notes=p.notes||[];
    p.notes.push({date:today(),text:`Step completed by ${CU}. Next step: ${nsDesc}`,author:CU});
    logActivity(p,`Step completed by ${CU}. Follow-up: "${nsDesc.slice(0,80)}"`);

    // Update description and deadline with the new step
    p.description=nsDesc;
    p.nextStep=nsDesc;
    if(nsDue)p.due=nsDue;
    p.phase='In Progress';p.status='In Progress';
    p.completed=false;p.completedDate=null;

    // Reset acknowledgments for the new step
    p.acknowledged={};

    await saveP(p);

    // Notify newly assigned person if different
    const newAssign=nsAssign;
    if(newAssign&&newAssign!==CU){
      const owner=OWNERS.find(o=>o.name===newAssign);
      if(owner){
        const sub=encodeURIComponent(`[Next step assigned] ${p.name}`);
        const body=encodeURIComponent(`Hi ${fn(newAssign)},\n\nThere is a new step on: ${p.name}\n\nNext step: ${nsDesc}${nsDue?'\nNew deadline: '+fmtD(nsDue):''}\n\nPlease log in to acknowledge and track this item.\n\nThanks,\n${CU}`);
        window.open(`mailto:${owner.email}?subject=${sub}&body=${body}`,'_blank');
      }
    }

    // Notify Brian if a performer updated it
    if(!isAdmin()){
      const brian=OWNERS.find(o=>o.name===ADMIN);
      const sub=encodeURIComponent(`[Follow-up step] ${p.name}`);
      const body=encodeURIComponent(`Hi Brian,\n\n${CU} has completed a step on "${p.name}" and added a follow-up:\n\nNext step: ${nsDesc}${nsDue?'\nNew deadline: '+fmtD(nsDue):''}\n\nThe item remains active on the dashboard.\n\nThanks,\n${CU}`);
      window.open(`mailto:${brian?.email||'mershon@ohio.edu'}?subject=${sub}&body=${body}`,'_blank');
      // Log to notification bell
      S.notifLog.unshift({date:today(),project:p.name,trigger:`${CU} completed a step — next step: "${nsDesc.slice(0,60)}${nsDesc.length>60?'…':''}"`,daysLeft:nsDue?dU(nsDue):null,recipients:ADMIN,href:null});
      await saveLog(S.notifLog);updateNotifBadge();
    }

    closeOv();
    toast('Step logged ✅ — item updated with next step and stays active.');

  } else {
    // ── Complete path — mark done, move to Completed tab ──
    p.completed=true;p.completedDate=today();
    p.phase='Completed';p.status='Completed';
    p.notes=p.notes||[];
    p.notes.push({date:today(),text:`Marked complete by ${CU}.`,author:CU});
    logActivity(p,`Marked complete by ${CU}`);
    await saveP(p);

    // Notify Brian via notification log when a performer completes an item
    if(!isAdmin()){
      S.notifLog.unshift({date:today(),project:p.name,trigger:`${CU} marked this item complete ✅`,daysLeft:null,recipients:ADMIN,href:null});
      await saveLog(S.notifLog);updateNotifBadge();
    }

    if(generateSOP){
      closeOv();
      toast('Item completed ✅');
      setTimeout(()=>openSOPGenerator(id),400);
    } else {
      closeOv();
      toast('Item completed ✅ — moved to Completed tab.');
    }
  }

  // Re-render everything
  if(isAdmin()){renderDash();if(currentTab==='tasks')renderDash();}
  else{renderPerformerDash();if(_perfTab==='done')renderPerfDone();}
  updatePerfLogBadge();
};

// Stored in Firestore: meta/todos_{userKey} as {items:[...]}
function todoKey(){return'todos_'+(CU||'').replace(/\s/g,'_')}
let _todos=[]; // local cache for current user
let _todosLoaded=false;
let _unsubTodos=null;

function startTodoListener(){
  if(_unsubTodos)_unsubTodos();
  _unsubTodos=onSnapshot(doc(db,'meta',todoKey()),sn=>{
    _todos=sn.exists()?(sn.data().items||[]):[];
    _todosLoaded=true;
    updateTasksBadge();
    if(currentTab==='dash')renderDash();
  });
}

async function saveTodos(){
  await setDoc(doc(db,'meta',todoKey()),{items:_todos,owner:CU,updated:today()});
}

window.addTodo=async()=>{
  const inp=document.getElementById('todo-inp');
  const text=(inp?inp.value.trim():'');
  if(!text){toast('Enter a to-do item.');if(inp)inp.focus();return;}
  const due=document.getElementById('todo-due')?.value||'';
  const assignTo=document.getElementById('todo-assign')?.value||'';
  const item={id:String(Date.now()),text,priority:'medium',due,assignTo,done:false,doneDate:null,createdDate:today()};
  _todos.push(item);
  await saveTodos();
  if(inp)inp.value='';
  const duEl=document.getElementById('todo-due');if(duEl)duEl.value='';
  const asEl=document.getElementById('todo-assign');if(asEl)asEl.value='';
  updateTasksBadge();
  renderDash();
  toast(assignTo?`Added ✅ — tagged for ${fn(assignTo)}`:'Added ✅');
  setTimeout(()=>{const el=document.getElementById('todo-inp');if(el)el.focus();},80);
};

window.toggleTodo=async(id,checked)=>{
  const t=_todos.find(x=>x.id===id);if(!t)return;
  if(!checked){
    // Unchecking — just reopen, no popup needed
    t.done=false;t.doneDate=null;
    await saveTodos();
    updateTasksBadge();
    renderDash();
    return;
  }
  // Checking — open completion dialog
  openTodoCompleteDialog(id);
};

window.selectTodoFollowup=function(val){
  const fields=document.getElementById('tdc-followup-fields');
  if(fields)fields.style.display=val==='yes'?'':'none';
  ['no','yes'].forEach(opt=>{
    const el=document.getElementById('tdc-'+opt+'-label');
    if(el)el.style.borderColor=val===opt?'var(--ou-green)':'var(--border2)';
  });
};

window.confirmTodoComplete=async id=>{
  const t=_todos.find(x=>x.id===id);if(!t)return;
  const hasFollowup=document.querySelector('[name=tdc-followup]:checked')?.value==='yes';
  const projectId=document.getElementById('tdc-project')?.value;

  // Mark this to-do as done
  t.done=true;t.doneDate=today();

  // Create follow-up to-do if requested
  if(hasFollowup){
    const fuText=document.getElementById('tdc-followup-text')?.value.trim()||t.text;
    const fuDue=document.getElementById('tdc-followup-due')?.value||'';
    _todos.push({id:String(Date.now()+1),text:fuText,due:fuDue,done:false,doneDate:null,priority:'medium',createdDate:today()});
  }

  await saveTodos();

  // Link to project/event if selected
  if(projectId){
    const p=S.projects.find(x=>x.id===projectId);
    if(p){
      p.notes=p.notes||[];
      const noteText=`Completed step: "${t.text}"${hasFollowup?' — follow-up created':''}`;
      p.notes.push({date:today(),text:noteText,author:CU});
      logActivity(p,`Completed step (from to-do) by ${CU}: "${t.text}"`);
      await saveP(p);
      toast(`To-do completed ✅ — added to "${p.name}"`);
    }
  } else {
    toast('To-do completed ✅');
  }

  updateTasksBadge();
  closeOv();
  renderDash();
};

window.deleteTodo=async id=>{
  _todos=_todos.filter(x=>x.id!==id);
  await saveTodos();
  renderDash();
};

window.clearDoneTodos=async()=>{
  if(!confirm('Remove all completed to-dos?'))return;
  _todos=_todos.filter(x=>!x.done);
  await saveTodos();
  renderDash();
  toast('Completed to-dos cleared.');
};

let currentTab='dash';
window.switchTab=function(tab){
  currentTab=tab;
  ['dash','cardlog','checklog','fin','agenda'].forEach(t=>{

};

// ── SOP state ──
let sopSelectedId=null;
let dragSrc=null;

// ── SOP render ──
function renderSOP(){
  const el=document.getElementById('sop-view');
  if(!el)return;
  const visible=S.projects.filter(canSee);
  const withSteps=visible.filter(p=>(p.steps||[]).length>0);
  // Validate sopSelectedId still exists and is visible
  if(sopSelectedId&&!visible.find(p=>p.id===sopSelectedId)) sopSelectedId=null;

  // Build selector options — all visible items
  const opts=visible.map(p=>`<option value="${esc(p.id)}" ${sopSelectedId===p.id?'selected':''}>${esc(p.name)}${(p.steps||[]).length?' ('+p.steps.length+' steps)':''}</option>`).join('');

  let html=`<div class="sop-header">
    <div><h2><i class="ti ti-list-check" style="font-size:18px;vertical-align:-2px;color:var(--ou-green)"></i> SOPs &amp; Session Plans</h2>
    <p style="font-size:12px;color:var(--text2);margin-top:3px">Step-by-step order of operations for each item</p></div>
    <div class="sop-selector">
      <select id="sop-sel" onchange="sopSelectedId=this.value;renderSOP()">
        <option value="">— Select an item to view its SOP —</option>
        ${opts}
      </select>
      ${sopSelectedId?`<button class="btn sm pri" onclick="printSOP()"><i class="ti ti-printer"></i> Print</button>
      <button class="btn sm" onclick="exportSopDocx()"><i class="ti ti-file-word"></i> Export Word</button>`:''}
    </div>
  </div>`;

  if(!sopSelectedId){
    // Overview — show all items with step counts
    if(withSteps.length){
      html+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">`;
      withSteps.forEach(p=>{
        const done=(p.steps||[]).filter(s=>s.done).length,total=(p.steps||[]).length;
        const pct=Math.round(done/total*100);
        html+=`<div class="sop-card" style="cursor:pointer" onclick="sopSelectedId='${p.id}';document.getElementById('sop-sel').value='${p.id}';renderSOP()">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.75rem">
            <div><div style="font-size:15px;font-weight:800;color:var(--text)">${esc(p.name)}</div>
            <div style="font-size:11px;color:var(--text2);margin-top:2px">${esc(p.category||'—')} · ${esc(p.owner||'Unassigned')}</div></div>
            <span class="rbadge ${cRisk(p)==='g'?'rg':cRisk(p)==='y'?'ry':cRisk(p)==='r'?'rr':cRisk(p)==='b'?'rb':'rc'}" style="font-size:10px">${total} step${total!==1?'s':''}</span>
          </div>
          <div style="background:var(--bg3);border-radius:20px;height:6px;overflow:hidden;margin-bottom:6px">
            <div style="height:100%;width:${pct}%;background:var(--ou-green);border-radius:20px;transition:width .3s"></div>
          </div>
          <div style="font-size:11px;color:var(--text2)">${done} of ${total} steps complete (${pct}%)</div>
        </div>`;
      });
      html+=`</div>`;
    } else {
      html+=`<div class="sop-empty"><i class="ti ti-list-check"></i><p style="font-size:14px;font-weight:600;margin-bottom:6px">No SOPs yet</p><p style="font-size:13px">Select an item above and add steps to build its SOP.</p></div>`;
    }
  } else {
    const p=S.projects.find(x=>x.id===sopSelectedId);
    if(!p){html+=`<div class="sop-empty"><i class="ti ti-alert-circle"></i><p>Item not found.</p></div>`;el.innerHTML=html;return;}
    const ce=isAdmin()||p.createdBy===CU;
    const steps=p.steps||[];
    const done=steps.filter(s=>s.done).length;
    const pct=steps.length?Math.round(done/steps.length*100):0;

    html+=`<div class="sop-card" id="sop-detail">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem">
        <div>
          <div style="font-size:20px;font-weight:800;color:var(--text);margin-bottom:4px">${esc(p.name)}</div>
          ${p.description?`<p style="font-size:13px;color:var(--text2);line-height:1.5;max-width:700px">${esc(p.description)}</p>`:''}
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${ce?`<button class="btn sm pri" onclick="openAddStep('${p.id}')"><i class="ti ti-plus"></i> Add step</button>`:''}
        </div>
      </div>
      <div class="sop-meta">
        <div class="sop-meta-item"><div class="sml">Category</div><div class="svl">${esc(p.category||'—')}</div></div>
        <div class="sop-meta-item"><div class="sml">Owner</div><div class="svl">${esc(p.owner||'Unassigned')}</div></div>
        <div class="sop-meta-item"><div class="sml">Deadline</div><div class="svl">${fmtD(p.due)}</div></div>
        <div class="sop-meta-item"><div class="sml">Progress</div>
          <div style="display:flex;align-items:center;gap:8px">
            <div style="flex:1;background:var(--bg3);border-radius:20px;height:8px;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:var(--ou-green);border-radius:20px"></div>
            </div>
            <span style="font-size:12px;font-weight:700;color:var(--text);white-space:nowrap">${done}/${steps.length}</span>
          </div>
        </div>
      </div>`;

    if(!steps.length){
      html+=`<div class="sop-empty"><i class="ti ti-list-details"></i>
        <p style="font-size:14px;font-weight:600;margin-bottom:6px">No steps yet</p>
        <p style="font-size:13px">${ce?'Click "Add step" to begin building this SOP.':'The item creator can add steps here.'}</p>
      </div>`;
    } else {
      html+=`<div class="step-list" id="step-list">`;
      steps.forEach((s,i)=>{
        html+=`<div class="step-card${s.done?' done':''}" draggable="${ce}" ondragstart="dragStart(event,${i})" ondragover="dragOver(event,${i})" ondrop="dropStep(event,'${p.id}',${i})" ondragleave="this.style.borderColor=''" id="step-${i}">
          ${ce?`<div class="step-drag" title="Drag to reorder"><i class="ti ti-grip-vertical"></i></div>`:''}
          <div class="step-num">${s.done?'<i class="ti ti-check" style="font-size:12px"></i>':i+1}</div>
          <div class="step-body">
            <div class="step-title">${esc(s.title)}</div>
            ${s.desc?`<div class="step-desc">${esc(s.desc)}</div>`:''}
            <div class="step-meta">
              ${s.assignee?`<span><i class="ti ti-user"></i>${esc(s.assignee)}</span>`:''}
              ${s.due?`<span><i class="ti ti-calendar"></i>${fmtD(s.due)}</span>`:''}
              ${s.done&&s.doneDate?`<span style="color:var(--green-text)"><i class="ti ti-check"></i>Done ${esc(fmtS(s.doneDate))}</span>`:''}
            </div>
          </div>
          <div class="step-actions">
            ${ce?`<label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer;margin-right:4px">
              <input type="checkbox" ${s.done?'checked':''} onchange="toggleStep('${p.id}',${i},this.checked)" style="width:15px;height:15px">Done</label>
            <button class="ibtn" onclick="openEditStep('${p.id}',${i})" title="Edit step"><i class="ti ti-edit" style="font-size:14px"></i></button>
            <button class="ibtn" onclick="deleteStep('${p.id}',${i})" title="Delete step"><i class="ti ti-trash" style="font-size:14px"></i></button>`:''}
          </div>
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  }
  el.innerHTML=html;
  // Restore dropdown selection after re-render
  const sel=document.getElementById('sop-sel');
  if(sel&&sopSelectedId) sel.value=sopSelectedId;
}
window.renderSOP=renderSOP;

// ── Step drag/drop ──
window.dragStart=(e,i)=>{dragSrc=i;e.dataTransfer.effectAllowed='move'};
window.dragOver=(e,i)=>{e.preventDefault();e.dataTransfer.dropEffect='move';const c=document.getElementById('step-'+i);if(c)c.style.borderColor='var(--ou-green)'};
window.dropStep=async(e,pid,targetI)=>{
  e.preventDefault();
  if(dragSrc===null||dragSrc===targetI)return;
  const p=S.projects.find(x=>x.id===pid);if(!p||!p.steps)return;
  const steps=[...p.steps];
  const [moved]=steps.splice(dragSrc,1);
  steps.splice(targetI,0,moved);
  p.steps=steps;
  await saveP(p);
  dragSrc=null;
  renderSOP();
};

window.stAddTag=()=>{const sel=document.getElementById('st-tag-sel');if(!sel||!sel.value)return;if(!window._fsTags)window._fsTags=[];if(window._fsTags.includes(sel.value)){toast('Already tagged.');return}window._fsTags.push(sel.value);const c=document.getElementById('st-tags');if(c)c.innerHTML=window._fsTags.map(t=>`<span style="display:inline-flex;align-items:center;gap:4px;background:var(--blue-bg);color:var(--blue-text);border:.5px solid #90CAF9;border-radius:20px;font-size:11px;font-weight:600;padding:2px 8px">${esc(t)}<button style="background:none;border:none;cursor:pointer;color:inherit;padding:0 0 0 2px;font-size:12px" onclick="stRemoveTag('${esc(t)}')">&times;</button></span>`).join('');sel.value=''};
window.stRemoveTag=name=>{window._fsTags=(window._fsTags||[]).filter(t=>t!==name);const c=document.getElementById('st-tags');if(c)c.innerHTML=window._fsTags.map(t=>`<span style="display:inline-flex;align-items:center;gap:4px;background:var(--blue-bg);color:var(--blue-text);border:.5px solid #90CAF9;border-radius:20px;font-size:11px;font-weight:600;padding:2px 8px">${esc(t)}<button style="background:none;border:none;cursor:pointer;color:inherit;padding:0 0 0 2px;font-size:12px" onclick="stRemoveTag('${esc(t)}')">&times;</button></span>`).join('')};

window.saveStep=async(pid,idx)=>{
  const title=document.getElementById('st-title').value.trim();
  if(!title){toast('Step title is required.');return;}
  const desc=document.getElementById('st-desc').value.trim();
  const assignee=document.getElementById('st-assign').value;
  const due=document.getElementById('st-due').value;
  const tags=window._fsTags||[];
  const p=S.projects.find(x=>x.id===pid);if(!p)return;
  if(!p.steps)p.steps=[];
  const step={title,desc,assignee,due,tags,done:false,doneDate:null,addedBy:CU,addedDate:today()};
  if(idx===null){p.steps.push(step);}
  else{step.done=p.steps[idx].done;step.doneDate=p.steps[idx].doneDate;p.steps[idx]=step;}
  await saveP(p);
  if(tags.length){const tagged=OWNERS.filter(o=>tags.includes(o.name));if(tagged.length){const to=tagged.map(o=>o.email).join(',');const sub=encodeURIComponent('[Step Tagged] '+step.title+' — '+p.name);const body=encodeURIComponent('You have been tagged on a step:\n\nItem: '+p.name+'\nStep: '+step.title+(step.desc?'\nDetails: '+step.desc:'')+(step.assignee?'\nAssigned to: '+step.assignee:'')+(step.due?'\nDue: '+fmtD(step.due):'')+'\n\nVPRCA Team Project Tracker');window.open('mailto:'+to+'?subject='+sub+'&body='+body,'_blank');}}
  window._fsTags=[];
  closeOv();renderSOP();
  toast(idx===null?'Step added.':'Step updated.');
};

window.toggleStep=async(pid,idx,checked)=>{
  const p=S.projects.find(x=>x.id===pid);if(!p||!p.steps)return;
  p.steps[idx].done=checked;
  p.steps[idx].doneDate=checked?today():null;
  await saveP(p);
  renderSOP();
};

window.deleteStep=async(pid,idx)=>{
  if(!confirm('Delete this step?'))return;
  const p=S.projects.find(x=>x.id===pid);if(!p||!p.steps)return;
  p.steps.splice(idx,1);
  await saveP(p);
  renderSOP();
  toast('Step deleted.');
};

// ── Export SOP as Word (.docx) ──
window.exportSopDocx=function(){
  const p=S.projects.find(x=>x.id===sopSelectedId);if(!p)return;
  const steps=p.steps||[];
  // Build a simple RTF that Word can open, or use HTML-based docx via Blob
  const rows=steps.map((s,i)=>`
    <tr>
      <td style="width:5%;text-align:center;font-weight:bold;background:${s.done?'#c8e6c9':'#E8F5E9'};color:#006A4E">${s.done?'✓':i+1}</td>
      <td style="width:30%;font-weight:bold">${s.title}</td>
      <td style="width:35%">${s.desc||'—'}</td>
      <td style="width:15%">${s.assignee||'—'}</td>
      <td style="width:15%">${s.due?fmtD(s.due):'—'}</td>
    </tr>`).join('');

  const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office"
    xmlns:w="urn:schemas-microsoft-com:office:word"
    xmlns="http://www.w3.org/TR/REC-html40">
  <head><meta charset="utf-8">
  <style>
    body{font-family:Calibri,sans-serif;font-size:11pt;color:#111}
    h1{font-size:18pt;color:#006A4E;border-bottom:2pt solid #006A4E;padding-bottom:4pt}
    h2{font-size:12pt;color:#006A4E;text-transform:uppercase;letter-spacing:.05em;margin-top:16pt}
    table{width:100%;border-collapse:collapse;font-size:10pt}
    th{background:#006A4E;color:#fff;padding:6pt 8pt;text-align:left;font-weight:bold}
    td{padding:5pt 8pt;border-bottom:0.5pt solid #ddd;vertical-align:top}
    tr:nth-child(even) td{background:#f9f9f9}
    .meta-table td{border:none;padding:3pt 8pt}
    .meta-label{font-weight:bold;color:#555;font-size:9pt;text-transform:uppercase}
    p.footer{font-size:8pt;color:#999;border-top:0.5pt solid #ddd;padding-top:6pt;margin-top:20pt}
  </style></head>
  <body>
  <h1>SOP: ${p.name}</h1>
  ${p.description?`<p>${p.description}</p>`:''}
  <table class="meta-table"><tr>
    <td><span class="meta-label">Category</span><br>${p.category||'—'}</td>
    <td><span class="meta-label">Owner</span><br>${p.owner||'Unassigned'}</td>
    <td><span class="meta-label">Deadline</span><br>${fmtD(p.due)}</td>
    <td><span class="meta-label">Progress</span><br>${steps.filter(s=>s.done).length} of ${steps.length} steps complete</td>
  </tr></table>
  <h2>Order of Operations — ${steps.length} Step${steps.length!==1?'s':''}</h2>
  <table>
    <thead><tr><th>#</th><th>Step</th><th>Description</th><th>Assigned To</th><th>Due Date</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <p class="footer">Generated by VPRCA Team Project Tracker &bull; ${new Date().toLocaleDateString()} &bull; Ohio University Division of Research &amp; Creative Activity</p>
  </body></html>`;

  const blob=new Blob(['\ufeff'+html],{type:'application/msword'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`SOP_${p.name.replace(/[^a-z0-9]/gi,'_')}.doc`;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url)},100);
  toast('Word document downloaded.');
};

window.fsSaveStep=async idx=>{
  const title=document.getElementById('fs-title').value.trim();
  if(!title){toast('Step title is required.');return}
  const step={
    title,
    desc:document.getElementById('fs-desc').value.trim(),
    assignee:document.getElementById('fs-assign').value,
    due:document.getElementById('fs-due').value,
    tags:window._fsTags||[],
    done:false,doneDate:null,
    addedBy:CU,addedDate:today()
  };
  if(!_ed.steps)_ed.steps=[];
  if(idx===null){_ed.steps.push(step);}
  else{step.done=_ed.steps[idx].done;step.doneDate=_ed.steps[idx].doneDate;_ed.steps[idx]=step;}
  // Send tag notification emails
  if(step.tags&&step.tags.length){
    const tagged=OWNERS.filter(o=>step.tags.includes(o.name));
    if(tagged.length){
      const to=tagged.map(o=>o.email).join(',');
      const sub=encodeURIComponent('[Step Tagged] '+step.title+' — '+(_ed.name||'New item'));
      const body=encodeURIComponent('You have been tagged on a step:\n\nItem: '+(_ed.name||'New item')+'\nStep: '+step.title+(step.desc?'\nDetails: '+step.desc:'')+(step.assignee?'\nAssigned to: '+step.assignee:'')+(step.due?'\nDue: '+fmtD(step.due):'')+'\n\nVPRCA Team Project Tracker');
      window.open('mailto:'+to+'?subject='+sub+'&body='+body,'_blank');
    }

  closeOv();
  renderForm(window._formMode||'add');
};
window.submitP=async eid=>{
  const name=document.getElementById('f-name').value.trim();
  if(!name){toast('Name required.');return;}
  const phase=document.querySelector('[name=f-phase]:checked')?.value||'Not Started';
  const assignedTo=[...document.querySelectorAll('#assignee-chips input:checked')].map(x=>x.value);
  const description=document.getElementById('f-desc').value.trim();
  const obj={
    ..._ed,name,
    category:document.getElementById('f-category').value,
    phase,
    status:phase,
    due:document.getElementById('f-due').value,
    description,nextStep:description,
    assignedTo,
    owner:CU,
    visibility:'group',
    group:GROUPS[0],
    triggers:_ed.triggers||{t30:true,t14:true,t1:false,tc:true},
    recipients:assignedTo.map(n=>OWNERS.find(o=>o.name===n)).filter(Boolean).map(o=>({name:o.name,email:o.email})),
    createdBy:_ed.createdBy||CU,
    acknowledged:{},
    flag:false,approvalRequired:false
  };
  const isNew=eid==='null';
  const prevAssigned=isNew?[]:(_ed.assignedTo||[]);
  // Log activity for Events
  if(obj.category==='Events'){
    if(isNew){logActivity(obj,`Event created by ${CU}`);}
    else{logActivity(obj,`Event updated by ${CU}`);}
    if(assignedTo.length){
      logActivity(obj,`Assigned to: ${assignedTo.join(', ')}`);
    }
  }
  await saveP(obj);

  // Notify newly assigned people via email — single mailto with all addresses
  const newlyAssigned=assignedTo.filter(n=>!prevAssigned.includes(n)&&n!==CU);
  if(newlyAssigned.length){
    const owners=newlyAssigned.map(n=>OWNERS.find(o=>o.name===n)).filter(Boolean);
    if(owners.length){
      const to=owners.map(o=>o.email).join(',');
      const names=owners.map(o=>fn(o.name)).join(', ');
      const sub=encodeURIComponent(`[Assigned] ${obj.name}`);
      const body=encodeURIComponent(`Hi ${names},\n\nYou have been assigned to: ${obj.name}\n\nCategory: ${obj.category}\nStatus: ${phase}${obj.due?'\nDeadline: '+fmtD(obj.due):''}\n${description?'\nDetails: '+description:''}\n\nPlease log in to acknowledge and track this item.\n\nThanks,\n${CU}`);
      window.open(`mailto:${to}?subject=${sub}&body=${body}`,'_blank');
    }
  }

  // Auto-add to Brian's to-do if assigned to himself and no step todos exist
  const stepTodos=(obj.steps||[]).filter(s=>s.addToTodo);
  if(assignedTo.includes(CU)&&stepTodos.length===0){
    // Check if there's already a project-level todo for this item
    const existingTodo=_todos.find(t=>t.projectId===obj.id&&t.fromProject);
    if(!existingTodo){
      const todoItem={
        id:String(Date.now()+1),
        text:obj.name+(obj.due?' — Due '+fmtD(obj.due):''),
        priority:'medium',
        due:obj.due||'',
        done:false,doneDate:null,
        createdDate:today(),
        fromProject:true,
        projectId:obj.id
      };
      _todos.push(todoItem);
      await saveTodos();
    }
  }

  // Auto-add checked steps to Brian's to-do list
  (obj.steps||[]).forEach(async s=>{
    if(s.addToTodo&&!s.todoId){
      const todoItem={id:String(Date.now()+Math.random()),text:`${s.title} — ${obj.name}`,priority:'medium',due:s.due||'',done:false,doneDate:null,createdDate:today(),fromStep:true,stepId:s.id,projectId:obj.id};
      _todos.push(todoItem);
      s.todoId=todoItem.id;
    }
  });
  if((obj.steps||[]).some(s=>s.addToTodo)) await saveTodos();

  closeOv();
  toast(isNew?'Item added & team notified.':'Item updated.');
  refreshDash();
};
