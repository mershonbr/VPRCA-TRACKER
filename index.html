// ── File upload helpers ──
const MAX_FILE_SIZE=10*1024*1024; // 10MB

function fileIcon(name){
  const ext=(name.split('.').pop()||'').toLowerCase();
  if(['pdf'].includes(ext))return'📄';
  if(['doc','docx'].includes(ext))return'📝';
  if(['xls','xlsx','csv'].includes(ext))return'📊';
  if(['ppt','pptx'].includes(ext))return'📑';
  if(['png','jpg','jpeg','gif','webp','svg'].includes(ext))return'🖼';
  if(['zip','rar','7z'].includes(ext))return'🗜';
  if(['mp4','mov','avi','mkv'].includes(ext))return'🎬';
  return'📎';
}

function fmtBytes(b){
  if(b<1024)return b+' B';
  if(b<1024*1024)return(b/1024).toFixed(1)+' KB';
  return(b/(1024*1024)).toFixed(1)+' MB';
}

async function loadAttachments(pid){
  const listEl=document.getElementById('file-list-'+pid);
  const countEl=document.getElementById('att-count-'+pid);
  if(!listEl)return;
  try{
    const folderRef=ref(storage,'projects/'+pid+'/');
    const result=await listAll(folderRef);
    if(!countEl){}
    else countEl.textContent=result.items.length?`(${result.items.length} file${result.items.length!==1?'s':''})`: '(no files yet)';
    if(!result.items.length){
      listEl.innerHTML=`<div style="font-size:12px;color:var(--text3);padding:.35rem 0">No attachments yet — upload files above.</div>`;
      return;
    }
    const files=await Promise.all(result.items.map(async item=>{
      const url=await getDownloadURL(item);
      return{name:item.name,fullPath:item.fullPath,url};
    }));
    listEl.innerHTML=files.map(f=>`
      <div class="file-item">
        <div class="file-icon">${fileIcon(f.name)}</div>
        <div class="file-info">
          <div class="file-name">${esc(f.name)}</div>
          <div class="file-meta">Click to download</div>
        </div>
        <div class="file-actions">
          <a href="${f.url}" target="_blank" download="${esc(f.name)}" style="text-decoration:none">
            <button class="btn xs pri"><i class="ti ti-download" style="font-size:11px"></i> Download</button>
          </a>
          <button class="ibtn" onclick="deleteAttachment('${esc(f.fullPath)}','${pid}')" title="Delete file" style="padding:3px"><i class="ti ti-trash" style="font-size:13px"></i></button>
        </div>
      </div>`).join('');
  }catch(e){
    if(listEl)listEl.innerHTML=`<div style="font-size:12px;color:var(--red-text);padding:.35rem 0">Could not load files. Check Firebase Storage is enabled.</div>`;
    console.error('loadAttachments error:',e);
  }
}

window.handleFileDrop=async(e,pid)=>{
  e.preventDefault();
  document.getElementById('drop-zone-'+pid)?.classList.remove('drag-over');
  await uploadFiles(Array.from(e.dataTransfer.files),pid);
};
window.handleFileSelect=async(e,pid)=>{
  await uploadFiles(Array.from(e.target.files),pid);
  e.target.value=''; // reset so same file can be re-uploaded
};

async function uploadFiles(files,pid){
  const progressEl=document.getElementById('upload-progress-'+pid);
  if(!progressEl)return;
  for(const file of files){
    if(file.size>MAX_FILE_SIZE){toast(`"${file.name}" exceeds 10 MB limit.`);continue;}
    // Show progress row
    const rowId='up-'+Date.now();
    const row=document.createElement('div');
    row.className='upload-item';row.id=rowId;
    row.innerHTML=`<i class="ti ti-loader-2" style="font-size:14px;color:var(--ou-green);animation:spin .7s linear infinite;flex-shrink:0"></i>
      <span class="up-name">${esc(file.name)}</span>
      <span class="up-pct">0%</span>
      <div class="upload-progress" style="position:absolute;bottom:0;left:0;right:0;height:3px;margin:0;border-radius:0"><div class="upload-progress-bar" id="bar-${rowId}"></div></div>`;
    row.style.position='relative';
    progressEl.appendChild(row);
    // Upload
    const storageRef=ref(storage,'projects/'+pid+'/'+file.name);
    const task=uploadBytesResumable(storageRef,file);
    await new Promise((resolve,reject)=>{
      task.on('state_changed',
        snap=>{
          const pct=Math.round(snap.bytesTransferred/snap.totalBytes*100);
          const pctEl=row.querySelector('.up-pct');
          const barEl=document.getElementById('bar-'+rowId);
          if(pctEl)pctEl.textContent=pct+'%';
          if(barEl)barEl.style.width=pct+'%';
        },
        err=>{
          row.remove();
          toast(`Upload failed: ${file.name}`);
          console.error(err);
          reject(err);
        },
        ()=>{
          row.remove();
          resolve();
        }
      );
    }).catch(()=>{});
  }
  toast('Upload complete.');
  loadAttachments(pid);
}

window.deleteAttachment=async(fullPath,pid)=>{
  if(!confirm('Delete this file permanently?'))return;
  try{
    await deleteObject(ref(storage,fullPath));
    toast('File deleted.');
    loadAttachments(pid);
  }catch(e){
    toast('Could not delete file.');
    console.error(e);
  }
};;

window.saveAssignTask=async function(projectId){
  const p=S.projects.find(x=>x.id===projectId);if(!p)return;
  const title=document.getElementById('at-title')?.value.trim();
  if(!title){toast('Enter a task title.');return;}
  const desc=document.getElementById('at-desc')?.value.trim()||'';
  const due=document.getElementById('at-due')?.value||'';
  const assignee=document.getElementById('at-assign')?.value||CU;

  p.tasks=p.tasks||[];
  const task={id:String(Date.now()),title,desc,due,assignee,assignedBy:CU,assignedDate:today(),done:false,doneDate:null};
  p.tasks.push(task);
  logActivity(p,`Task assigned to ${assignee} by ${CU}: "${title}"`);
  await saveP(p);

  // Email the assignee
  const owner=OWNERS.find(o=>o.name===assignee);
  if(owner&&assignee!==CU){
    const sub=encodeURIComponent(`[Task assigned] ${title} — ${p.name}`);
    const body=encodeURIComponent(`Hi ${fn(assignee)},\n\nYou've been assigned a task on "${p.name}":\n\n${title}${desc?'\n\n'+desc:''}${due?'\n\nDue: '+fmtD(due):''}\n\nPlease log in to the tracker for details.\n\nThanks,\n${CU}`);
    window.open(`mailto:${owner.email}?subject=${sub}&body=${body}`,'_blank');
  }

  closeOv();
  toast('Task assigned ✅');
  if(isAdmin())renderDash();else renderPerformerDash();
};

// ── Deadline trigger checker ────────────────────────────────────────────────
// Scans visible projects for approaching deadlines and logs entries to the
// notification log when 30/14/1-day or completion thresholds are crossed.
// Runs for admin only (called from project listener + 60s interval).
async function checkNotify(){
  if(!isAdmin()||!CU)return;
  if(!S.projects.length)return;
  let logChanged=false;
  const toUpdate=[];
  const td=today();

  S.projects.filter(p=>!p.completed&&p.due).forEach(p=>{
    const days=dU(p.due);
    const trig=p.triggers||{};
    const notified=p.notified||{};
    const recipients=(p.assignedTo||[]).join(', ')||'—';
    let pChanged=false;

    const fire=(key,label,cond)=>{
      if(cond&&!notified[key]){
        S.notifLog.unshift({date:td,project:p.name,trigger:label,daysLeft:days,recipients,href:null});
        notified[key]=td;
        logChanged=true;pChanged=true;
      }
    };

    if(trig.t30) fire('t30','30-day reminder',days===30);
    if(trig.t14) fire('t14','14-day reminder',days===14);
    if(trig.t1)  fire('t1','1-day reminder — due tomorrow',days===1);
    if(days<0)   fire('overdue','Item is now overdue',true);

    if(pChanged){p.notified=notified;toUpdate.push(p);}
  });

  for(const p of toUpdate){
    try{await setDoc(doc(db,'projects',String(p.id)),p);}catch(e){/* ignore */}
  }
  if(logChanged){
    await saveLog(S.notifLog);
    updateNotifBadge();
  }
}

window.removeLogEntry=async i=>{
  S.notifLog.splice(i,1);
  await saveLog(S.notifLog);
  saveNotifReadCount(Math.max(0,getNotifReadCount()-1));
  updateNotifBadge();
  openNotifLog();
};

window.clearAllLog=async()=>{
  if(!confirm('Clear all notification entries?'))return;
  S.notifLog=[];
  await saveLog([]);
  saveNotifReadCount(0);
  updateNotifBadge();
  closeOv();
  toast('Notification log cleared.');
};

// ── Gantt / Timeline renderer ──
let ganttSelectedId='';
function renderGantt(){
  const el=document.getElementById('gantt-view');if(!el)return;
  // Ensure string comparison
  const gid=String(ganttSelectedId||'');
  const visible=S.projects.filter(canSee).filter(p=>(p.steps||[]).some(s=>s.due));
  // Validate selection still exists
  if(gid&&!visible.find(p=>String(p.id)===gid)) ganttSelectedId='';
  const opts=visible.map(p=>`<option value="${esc(p.id)}" ${String(p.id)===gid?'selected':''}>${esc(p.name)}</option>`).join('');

  let html=`<div class="sop-header">
    <div><h2><i class="ti ti-chart-gantt" style="font-size:18px;vertical-align:-2px;color:var(--ou-green)"></i> Timeline</h2>
    <p style="font-size:12px;color:var(--text2);margin-top:3px">Gantt chart view of steps and deadlines per item</p></div>
    <div class="sop-selector">
      <select class="gantt-selector" onchange="ganttSelectedId=this.value;renderGantt()">
        <option value="">— Select an item —</option>${opts}
      </select>
    </div>
  </div>`;

  if(!ganttSelectedId){
    if(!visible.length){
      html+=`<div class="sop-empty"><i class="ti ti-chart-gantt"></i><p style="font-size:14px;font-weight:600;margin-bottom:6px">No timeline data yet</p><p style="font-size:13px">Add steps with due dates to an item to see its timeline here.</p></div>`;
    } else {
      // Show mini overview of all items
      html+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px">`;
      visible.forEach(p=>{
        const stepsWithDue=(p.steps||[]).filter(s=>s.due);
        const dates=stepsWithDue.map(s=>new Date(s.due));
        const minD=new Date(Math.min(...dates)),maxD=new Date(Math.max(...dates));
        const done=stepsWithDue.filter(s=>s.done).length;
        html+=`<div class="sop-card" style="cursor:pointer" onclick="ganttSelectedId='${p.id}';document.querySelector('.gantt-selector').value='${p.id}';renderGantt()">
          <div style="font-size:15px;font-weight:800;color:var(--text);margin-bottom:4px">${esc(p.name)}</div>
          <div style="font-size:11px;color:var(--text2);margin-bottom:.75rem">${stepsWithDue.length} steps · ${fmtS(minD.toISOString().slice(0,10))} → ${fmtS(maxD.toISOString().slice(0,10))}</div>
          <div style="background:var(--bg3);border-radius:20px;height:6px;overflow:hidden">
            <div style="height:100%;width:${Math.round(done/stepsWithDue.length*100)}%;background:var(--ou-green);border-radius:20px"></div>
          </div>
          <div style="font-size:11px;color:var(--text2);margin-top:5px">${done} of ${stepsWithDue.length} steps complete</div>
        </div>`;
      });
      html+=`</div>`;
    }
    el.innerHTML=html;
    // Restore dropdown
    const gsel=document.querySelector('.gantt-selector');
    if(gsel&&ganttSelectedId)gsel.value=ganttSelectedId;
    return;
  }

  const p=S.projects.find(x=>String(x.id)===String(ganttSelectedId));
  if(!p){el.innerHTML=html+`<div class="sop-empty"><i class="ti ti-alert-circle"></i><p>Item not found.</p></div>`;return;}
  const steps=(p.steps||[]).filter(s=>s.due);
  if(!steps.length){
    el.innerHTML=html+`<div class="gantt-wrap"><div class="gantt-header"><h3>${esc(p.name)}</h3></div><div style="padding:2rem;text-align:center;color:var(--text2)"><i class="ti ti-calendar-off" style="font-size:28px;display:block;margin:0 auto 10px;color:var(--text3)"></i>No steps with due dates. Add steps with due dates to see the timeline.</div></div>`;
    // Restore dropdown
    setTimeout(()=>{const gsel=document.querySelector('.gantt-selector');if(gsel&&ganttSelectedId)gsel.value=ganttSelectedId;},50);
    return;
  }

  // Calculate date range
  const todayD=new Date();todayD.setHours(0,0,0,0);
  const dueDates=steps.map(s=>new Date(s.due));
  let minDate=new Date(Math.min(...dueDates,todayD));
  let maxDate=new Date(Math.max(...dueDates,todayD));
  // Pad by 7 days each side
  minDate=new Date(minDate.getTime()-7*86400000);
  maxDate=new Date(maxDate.getTime()+7*86400000);
  const totalDays=Math.ceil((maxDate-minDate)/86400000);

  // Generate month header labels
  const monthLabels=[];
  let cur=new Date(minDate);cur.setDate(1);
  while(cur<=maxDate){
    const pct=Math.max(0,(cur-minDate)/86400000/totalDays*100);
    monthLabels.push({label:cur.toLocaleDateString('en-US',{month:'short',year:'2-digit'}),pct});
    cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);
  }

  const todayPct=Math.max(0,Math.min(100,(todayD-minDate)/86400000/totalDays*100));

  html+=`<div class="gantt-wrap">
    <div class="gantt-header">
      <h3>${esc(p.name)}</h3>
      <div style="display:flex;gap:6px;align-items:center">
        <span style="font-size:12px;color:var(--text2)">${steps.filter(s=>s.done).length} of ${steps.length} steps complete</span>
        <button class="btn sm pri" onclick="openAddStep('${p.id}')"><i class="ti ti-plus"></i> Add step</button>
      </div>
    </div>
    <div class="gantt-grid">
      <table class="gantt-table">
        <thead>
          <tr>
            <th style="width:180px">Step</th>
            <th style="width:110px">Assigned</th>
            <th style="width:80px">Due</th>
            <th style="position:relative;min-width:400px">
              <div style="position:relative;height:20px">
                ${monthLabels.map(m=>`<span style="position:absolute;left:${m.pct}%;font-size:9px;font-weight:700;color:var(--text3);white-space:nowrap">${m.label}</span>`).join('')}
              </div>
            </th>
          </tr>
        </thead>
        <tbody>`;

  steps.forEach((s,i)=>{
    const dueD=new Date(s.due);
    const duePct=Math.max(0,Math.min(99,(dueD-minDate)/86400000/totalDays*100));
    const color=PRESENCE_COLORS[s.assignee]||'#006A4E';
    const tagAvatars=(s.tags||[]).map(t=>`<div class="gantt-tag-av" style="background:${PRESENCE_COLORS[t]||'#888'}" title="${t}">${t.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}</div>`).join('');
    const barWidth=Math.max(1.5,1);// milestone: single point
    html+=`<tr>
      <td><div class="gantt-row-label${s.done?' done':''}" style="${s.done?'text-decoration:line-through;color:var(--text3)':''}">${i+1}. ${esc(s.title)}</div>
        ${s.desc?`<div style="font-size:10px;color:var(--text3);margin-top:1px;max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.desc)}</div>`:''}
      </td>
      <td>
        <div class="gantt-row-assign">${esc(s.assignee||'—')}</div>
        ${tagAvatars?`<div style="display:flex;margin-top:4px">${tagAvatars}</div>`:''}
      </td>
      <td style="color:${dueD<todayD&&!s.done?'var(--red-text)':'var(--text)'};font-size:11px;font-weight:${dueD<todayD&&!s.done?'700':'400'}">${fmtS(s.due)}</td>
      <td class="gantt-bar-cell">
        <div class="gantt-today-line" style="left:${todayPct}%"></div>
        <div class="gantt-milestone" style="left:${duePct}%;background:${s.done?'var(--green-border)':color}" title="${esc(s.title)} — Due ${fmtD(s.due)}"></div>
        <div class="gantt-bar${s.done?' done':''}" style="left:max(0%,calc(${duePct}% - 60px));width:120px;background:${s.done?'var(--green-border)':color};opacity:${s.done?0.5:1}" title="${esc(s.title)}">
          ${esc(s.title.length>14?s.title.slice(0,14)+'…':s.title)}
        </div>
      </td>
    </tr>`;
  });

  html+=`</tbody></table></div>
    <div class="gantt-legend">
      <span style="font-size:11px;font-weight:700;color:var(--text2);margin-right:4px">Legend:</span>
      <div class="gantt-legend-item"><div style="width:2px;height:14px;background:#EF4444;border-radius:1px"></div> Today</div>
      <div class="gantt-legend-item"><div class="gantt-legend-dot" style="background:var(--ou-green);rotate:45deg"></div> Step milestone</div>
      <div class="gantt-legend-item"><div class="gantt-legend-dot" style="background:var(--green-border)"></div> Completed</div>
      ${Object.entries(PRESENCE_COLORS).map(([n,c])=>`<div class="gantt-legend-item"><div class="gantt-legend-dot" style="background:${c};border-radius:50%"></div>${lastName(n)}</div>`).join('')}
    </div>
  </div>`;
  el.innerHTML=html;
  // Restore dropdown selection after re-render
  setTimeout(()=>{const gsel=document.querySelector('.gantt-selector');if(gsel&&ganttSelectedId)gsel.value=ganttSelectedId;},50);
}
window.renderGantt=renderGantt;

window.doLogin=async function(){
  const name=document.getElementById('lu').value;
  const pw=document.getElementById('lpw').value;
  const errEl=document.getElementById('lerr');
  errEl.textContent='';
  if(!name){errEl.textContent='Please select your name.';return;}
  if(!pw){errEl.textContent='Please enter a password.';return;}
  const users=await getUsers();
  const key=name.replace(/\s/g,'_');
  const hashed=await sha256(pw);
  if(!users[key]){
    // First-time setup — require confirm password
    const cpw=document.getElementById('lcpw').value;
    if(!cpw){errEl.textContent='Please confirm your password.';return;}
    if(pw!==cpw){errEl.textContent='Passwords do not match.';return;}
    if(pw.length<4){errEl.textContent='Password must be at least 4 characters.';return;}
    users[key]={hash:hashed,created:today()};
    await saveUsers(users);
    completeLogin(name);
  } else if(users[key].hash===hashed){
    completeLogin(name);
  } else {
    errEl.textContent='Incorrect password. Please try again.';
  }
};

function startListeners(){

  onSnapshot(collection(db,'contacts'),sn=>{S.contacts=sn.docs.map(d=>d.data())});

    if(sn.exists())S.notifLog=sn.data().entries||[];

    else updatePerfLogBadge();
  });
  onSnapshot(collection(db,'presence'),sn=>{renderPresence(sn)});
}

function inlineE(id,field,val){const p=S.projects.find(x=>x.id===id);if(!p)return;p[field]=val;saveP(p);}
window.inlineE=inlineE;

// ── Notification badge ────────────────────────────────────────────────────

bootstrap().catch(e=>{document.getElementById('loading-screen').innerHTML=`<div style="color:#fff;text-align:center;padding:2rem"><div style="font-size:32px;margin-bottom:1rem">⚠️</div><div style="font-weight:700">${e.message}</div></div>`});
setInterval(checkNotify,60000);
</script>
